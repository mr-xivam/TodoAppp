apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todoapp
  template:
    metadata:
      labels:
        app: todoapp
    spec:
      containers:
        - name: todoapp
          image: todoapp:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: ConnectionStrings__DefaultConnection
              value: "Server=mysql;Port=3306;Database=todoapp;User=todouser;Password=YourPassword123!"
