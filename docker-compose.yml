services:
  app:
    build: .
    container_name: todoapp
    restart: always
    expose:
      - "5000"
    depends_on:
      - mysql
    environment:
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=todoapp;User=todouser;Password=YourPassword123!"

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: todoapp
      MYSQL_USER: todouser
      MYSQL_PASSWORD: YourPassword123!
    volumes:
      - mysql_data:/var/lib/mysql

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./todoapp.nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

volumes:
  mysql_data: {}
